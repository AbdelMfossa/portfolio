{% load static %}
<!-- PAGE LOADER -->
<div id="page-loader"
    class="fixed inset-0 z-[100] bg-slate-50 dark:bg-slate-900 flex flex-col items-center justify-center transition-all duration-700 ease-in-out">
    <div class="relative flex flex-col items-center justify-center w-32 h-32">
        <!-- Cercle d'animation (pulse background) -->
        <div class="absolute inset-0 bg-blue-100/50 rounded-full animate-ping"></div>
        <!-- Logo principal -->
        <div class="relative z-10 animate-loader">
            <img src="{% static 'portfolio/images/logo abdelmfossa.svg' %}" alt="Chargement"
                class="w-16 h-auto dark:invert transition-all duration-300">
        </div>
    </div>
    <div class="mt-4 text-blue-600 font-semibold tracking-[0.3em] text-xs uppercase animate-pulse">
        Chargement
    </div>
</div>
